---
stages:
  - prepare
  - test
  - deploy

.lint_matrix: &lint_matrix
  image: ruby:$RUBY_VERSION
  parallel:
    matrix:
      - RUBY_VERSION: ['3.1', '3.2', '3.3', '3.4']

.cache: &cache_definition
  untracked: true
  key:
    files:
      - Gemfile.lock
    prefix: ruby-$RUBY_VERSION-rails-$RAILS_VERSION
  policy: pull
  paths:
    - 'vendor/'

before_script:
  - ruby --version
  - bundle --version
  - bundle config set --local jobs $(nproc)
  - bundle config set --local without ':doc'
  - bundle config set --local path vendor
  # Add Rails version override
  - |
    if [ ! -z "$RAILS_VERSION" ]; then
      echo "Installing Rails $RAILS_VERSION"
      bundle config set --local force_ruby_platform true
      bundle add rails --version "~> $RAILS_VERSION" --skip-install
    fi
  - bundle install --quiet
  - bundle exec rails --version

# Bundle stage
# ======================================

bundle:
  <<: *lint_matrix
  stage: prepare
  script:
    - echo "This job only fills the cache"
  cache:
    <<: *cache_definition
    policy: push

# Code lint
# ======================================

rubocop:
  <<: *lint_matrix
  stage: test
  script: bundle exec rubocop
  dependencies:
    - bundle

factory_bot_lint:
  <<: *lint_matrix
  stage: test
  script:
    - bundle exec rails db:test:prepare
    - bundle exec rake app:factory_bot:lint
  dependencies:
    - bundle

# Tests
# ======================================
rspec:
  image: ruby:$RUBY_VERSION
  parallel:
    # Compatibility from https://www.fastruby.io/blog/ruby/rails/versions/compatibility-table.html
    # We only support non end-of-life Ruby and Ruby on Rails versions:
    # - https://endoflife.date/ruby
    # - https://endoflife.date/rails
    matrix:
      - RUBY_VERSION: [ '3.2', '3.3', '3.4' ]
        RAILS_VERSION: [ '8.0' ]
      - RUBY_VERSION: [ '3.1', '3.2', '3.3', '3.4' ]
        RAILS_VERSION: [ '7.1', '7.2' ]
  stage: test
  script:
    - bundle exec rails db:test:prepare
    - bundle exec rspec
  dependencies:
    - bundle

# Gitlab pages
# ======================================
pages:
  image: ruby:3.1
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
  script:
    # This step should be removed for Ruby > 3.1
    # See: https://github.com/jekyll/jekyll/issues/9563
    - gem update --system
    - bundle config unset --local without
    - bundle install --quiet
    - .gitlab/scripts/copy_documentation_files
    - .gitlab/scripts/build_documentation
  artifacts:
    paths:
      - public
